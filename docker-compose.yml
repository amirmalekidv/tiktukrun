# ═══════════════════════════════════════════════════════════════════════════
# TIK TAK RUN — Production Docker Compose
# ═══════════════════════════════════════════════════════════════════════════
# Services: mongo (replica set rs0), mongo-init, redis, api, web, admin, nginx
# Usage: docker compose up -d
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ─── MongoDB 4.4 (temporary non-AVX fallback) ────────────────────────────
  mongo:
    image: mongo:4.4
    container_name: tiktakrun-mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongo-keyfile"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-tiktakrun}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      TZ: ${TZ:-Asia/Tehran}
    volumes:
      - mongo-data:/data/db
      - ./infra/mongo/mongo-keyfile:/etc/mongo-keyfile:ro
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - tiktakrun-net

  # ─── Mongo replica set initializer (runs once) ───────────────────────────
  mongo-init:
    image: mongo:4.4
    container_name: tiktakrun-mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    environment:
      MONGO_USER: ${MONGO_USER:-tiktakrun}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
    entrypoint: ["bash", "/init/init-replica.sh"]
    volumes:
      - ./infra/mongo/init-replica.sh:/init/init-replica.sh:ro
    networks:
      - tiktakrun-net

  # ─── Redis 7 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tiktakrun-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - tiktakrun-net

  # ─── NestJS API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: tiktakrun-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: ${TZ:-Asia/Tehran}
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-${JWT_SECRET}}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3010,http://localhost:3011}
      COOKIE_SECRET: ${COOKIE_SECRET}
      WEB_URL: ${WEB_URL}
      ADMIN_URL: ${ADMIN_URL}
      PROD_DOMAIN: ${PROD_DOMAIN}
      SMS_MOCK_MODE: ${SMS_MOCK_MODE:-false}
      SMS_PROVIDER: ${SMS_PROVIDER:-sms.ir}
      SMS_IR_API_URL: ${SMS_IR_API_URL:-https://api.sms.ir/v1/send/verify}
      SMS_IR_API_KEY: ${SMS_IR_API_KEY}
      SMS_IR_TEMPLATE_ID: ${SMS_IR_TEMPLATE_ID}
      SMS_IR_TEMPLATE_PARAM: ${SMS_IR_TEMPLATE_PARAM:-OTP}
      AUTH_DEMO_OTP_CODE: ${AUTH_DEMO_OTP_CODE:-}
      ZARINPAL_MERCHANT_ID: ${ZARINPAL_MERCHANT_ID}
      ZARINPAL_SANDBOX: ${ZARINPAL_SANDBOX}
      ZARINPAL_CALLBACK_URL: ${ZARINPAL_CALLBACK_URL}
      STORAGE_PATH: /storage/uploads
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-/uploads}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTP_LENGTH: ${OTP_LENGTH:-5}
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-120}
    volumes:
      - ./storage:/storage
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${API_PORT:-4010}:4000"
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tiktakrun-net

  # ─── Next.js Web Site ────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-TIK TAK RUN}
        NEXT_PUBLIC_DEMO_OTP_CODE: ${NEXT_PUBLIC_DEMO_OTP_CODE:-}
    container_name: tiktakrun-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: ${TZ:-Asia/Tehran}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      NEXT_PUBLIC_DEMO_OTP_CODE: ${NEXT_PUBLIC_DEMO_OTP_CODE:-}
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${WEB_PORT:-3010}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tiktakrun-net

  # ─── Next.js Admin Dashboard ─────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: infra/docker/admin.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_DEMO_OTP_CODE: ${NEXT_PUBLIC_DEMO_OTP_CODE:-}
    container_name: tiktakrun-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: ${TZ:-Asia/Tehran}
      PORT: 3001
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      NEXT_PUBLIC_DEMO_OTP_CODE: ${NEXT_PUBLIC_DEMO_OTP_CODE:-}
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${ADMIN_PORT:-3011}:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tiktakrun-net

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tiktakrun-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/sites:/etc/nginx/sites-enabled:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - ./storage/uploads:/var/www/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
      - admin
    networks:
      - tiktakrun-net

volumes:
  mongo-data:
    name: tiktakrun-mongo-data
  redis-data:
    name: tiktakrun-redis-data

networks:
  tiktakrun-net:
    name: tiktakrun-network
    driver: bridge
